<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Contratante — RH Musical</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo"><img src="Logo Rh Musical.png" alt="RH Musical" style="height:45px;"></a>
  <ul>
    <li><a href="artistas.html">Artistas</a></li>
    <li><a href="patrocinio.html">Patrocínio</a></li>
    <li><a href="cadastro-artista.html">Sou Artista</a></li>
    <li><a href="cadastro-empresa.html">Sou Contratante</a></li>
  </ul>
</nav>

<section>
  <div class="form-container">
    <h2>🏢 Cadastro de Contratante</h2>
    <p style="color:var(--muted); margin-bottom:1.5rem; font-size:0.9rem;">Encontre o artista ideal para o seu evento ou estabelecimento.</p>

    <form id="formEmpresa" autocomplete="off">
      <div class="form-group">
        <label>Nome da Empresa / Estabelecimento *</label>
        <input type="text" placeholder="Ex: Bar do João, Espaço Eventos Silva" required>
      </div>

      <div class="form-group">
        <label>Nome do Responsável *</label>
        <input type="text" placeholder="Nome completo" required>
      </div>

      <div class="form-group">
        <label>E-mail *</label>
        <input type="email" placeholder="contato@empresa.com" required>
      </div>

      <div class="form-group">
        <label>Telefone / WhatsApp *</label>
        <input type="tel" placeholder="(00) 00000-0000" required>
      </div>

      <div class="form-group">
        <label>Cidade / Estado *</label>
        <input type="text" placeholder="Ex: Tatuí - SP" required>
      </div>

      <div class="form-group">
        <label>Tipo de Estabelecimento *</label>
        <select required>
          <option value="">Selecione...</option>
          <option>Bar / Restaurante</option>
          <option>Casa de Shows</option>
          <option>Espaço para Eventos</option>
          <option>Hotel / Resort</option>
          <option>Produtor de Eventos</option>
          <option>Empresa Privada</option>
          <option>Outro</option>
        </select>
      </div>

      <div class="form-group">
        <label>Estilos musicais de interesse</label>
        <input type="text" placeholder="Ex: Sertanejo, MPB, Jazz">
      </div>

      <div class="form-group">
        <label>Frequência de contratação</label>
        <select>
          <option value="">Selecione...</option>
          <option>Eventual (1x por mês ou menos)</option>
          <option>Frequente (toda semana)</option>
          <option>Diário</option>
          <option>Para evento específico</option>
        </select>
      </div>

      <div class="form-group">
        <label>Orçamento médio por apresentação (R$)</label>
        <input type="number" placeholder="Ex: 800">
      </div>

      <div class="form-group">
        <label>Observações</label>
        <textarea placeholder="Descreva o tipo de evento, espaço, público esperado..."></textarea>
      </div>

      <div class="form-group">
        <label>Plano</label>
        <select>
          <option value="basico">Básico — Gratuito</option>
          <option value="premium">Premium — R$ 49/mês</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Criar Conta</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2024 RH Musical</p>
</footer>

<script type="module">
  import { db } from './firebase.js';
  import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import emailjs from 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/+esm';

  emailjs.init('_4jT4NMpMKCuYypaJ');

  document.getElementById('formEmpresa').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    const btn = f.querySelector('button[type=submit]');
    btn.textContent = 'Salvando...';
    btn.disabled = true;
    const empresa = {
      empresa: f[0].value,
      responsavel: f[1].value,
      email: f[2].value,
      telefone: f[3].value,
      cidade: f[4].value,
      tipo: f[5].value,
      estilos: f[6].value,
      frequencia: f[7].value,
      orcamento: f[8].value,
      obs: f[9].value,
      plano: f[10].value,
      data: new Date().toLocaleDateString('pt-BR')
    };
    try {
      await addDoc(collection(db, 'empresas'), empresa);
      await emailjs.send('service_6t3r6i8', 'template_ujtpyv8h', {
        nome: empresa.responsavel,
        email: empresa.email,
        cidade: empresa.cidade,
        plano: empresa.plano
      });
      alert('✅ Cadastro realizado com sucesso!\nVocê receberá um e-mail de confirmação em breve.');
      f.reset();
    } catch (err) {
      alert('❌ Erro ao salvar. Tente novamente.');
      console.error(err);
    }
    btn.textContent = 'Criar Conta';
    btn.disabled = false;
  });
</script>

</body>
</html>
