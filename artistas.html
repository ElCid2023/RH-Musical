<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artistas — RH Musical</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">RH <span>Musical</span></a>
  <ul>
    <li><a href="artistas.html">Artistas</a></li>
    <li><a href="patrocinio.html">Patrocínio</a></li>
    <li><a href="cadastro-artista.html">Sou Artista</a></li>
    <li><a href="cadastro-empresa.html">Sou Contratante</a></li>
  </ul>
</nav>

<section>
  <h2>🎵 Encontre seu Artista</h2>

  <div class="filtros">
    <input type="text" id="busca" placeholder="🔍 Buscar por nome..." oninput="filtrar()">
    <select id="estilo" onchange="filtrar()">
      <option value="">Todos os estilos</option>
      <option>Sertanejo</option>
      <option>Rock</option>
      <option>MPB</option>
      <option>Jazz</option>
      <option>Forró</option>
      <option>Pop</option>
      <option>Gospel</option>
    </select>
    <select id="cidade" onchange="filtrar()">
      <option value="">Todas as cidades</option>
      <option>Tatuí - SP</option>
      <option>Sorocaba - SP</option>
      <option>São Paulo - SP</option>
    </select>
  </div>

  <div class="artistas-grid" id="grid"></div>
</section>

<footer>
  <p>© 2024 RH Musical</p>
</footer>

<script>
  const artistasFixos = [
    { nome: "Carlos Violeiro", estilo: "Sertanejo", cidade: "Tatuí - SP", instrumento: "Violão e Voz", valor: "R$ 400", emoji: "🎸", premium: true, portfolio: "https://youtube.com" },
    { nome: "Banda Acústica SP", estilo: "MPB", cidade: "São Paulo - SP", instrumento: "Banda completa", valor: "R$ 1.200", emoji: "🎶", premium: true, portfolio: "https://soundcloud.com" },
    { nome: "Jazz Quartet", estilo: "Jazz", cidade: "Sorocaba - SP", instrumento: "Saxofone, Piano, Baixo, Bateria", valor: "R$ 800", emoji: "🎷", premium: false, portfolio: "" },
    { nome: "Ana Forró", estilo: "Forró", cidade: "Tatuí - SP", instrumento: "Sanfona e Voz", valor: "R$ 350", emoji: "🪗", premium: false, portfolio: "" },
    { nome: "Rock Garage", estilo: "Rock", cidade: "Sorocaba - SP", instrumento: "Banda de Rock", valor: "R$ 600", emoji: "🎤", premium: true, portfolio: "https://youtube.com" },
    { nome: "Louvor & Graça", estilo: "Gospel", cidade: "Tatuí - SP", instrumento: "Coral e Banda", valor: "R$ 500", emoji: "🎹", premium: false, portfolio: "" },
  ];

  function carregarArtistas() {
    const cadastrados = JSON.parse(localStorage.getItem('rhm_artistas') || '[]').map(a => ({
      nome: a.nomeArtistico,
      estilo: a.estilo,
      cidade: a.cidade,
      instrumento: a.instrumentos,
      valor: a.valor ? 'R$ ' + a.valor : '—',
      emoji: '🎵',
      premium: a.plano === 'premium',
      portfolio: a.portfolio || ''
    }));
    return [...artistasFixos, ...cadastrados];
  }

  let artistas = carregarArtistas();

  function renderizar(lista) {
    const grid = document.getElementById('grid');
    grid.innerHTML = lista.map(a => `
      <div class="artista-card">
        <div class="foto">${a.emoji}</div>
        <div class="info">
          <h3>${a.nome} ${a.premium ? '<span style="color:#fff808;font-size:0.7rem;">⭐ Premium</span>' : ''}</h3>
          <p>${a.instrumento}</p>
          <p style="margin-top:0.3rem;">${a.cidade}</p>
          <div style="margin-top:0.5rem;">
            <span class="tag">${a.estilo}</span>
            <span class="tag">${a.valor}</span>
          </div>
          ${a.portfolio ? `<a href="${a.portfolio}" target="_blank" class="btn btn-secondary" style="width:100%;margin-top:0.8rem;padding:0.5rem;display:block;text-align:center;">🎬 Ver Portfólio</a>` : ''}
          <button onclick="contatar('${a.nome}')" class="btn btn-secondary" style="width:100%;margin-top:0.5rem;padding:0.5rem;">Entrar em Contato</button>
        </div>
      </div>
    `).join('');
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const estilo = document.getElementById('estilo').value;
    const cidade = document.getElementById('cidade').value;

    const resultado = artistas.filter(a =>
      a.nome.toLowerCase().includes(busca) &&
      (estilo === '' || a.estilo === estilo) &&
      (cidade === '' || a.cidade === cidade)
    );
    renderizar(resultado);
  }

  function contatar(nome) {
    alert(`📩 Para entrar em contato com ${nome}, faça login ou cadastre-se como contratante.`);
  }

  renderizar(artistas);
</script>

</body>
</html>
